#cloud-config
package_update: true
package_upgrade: true
package_reboot_if_required: true

locale: en_US.UTF-8
timezone: Europe/Amsterdam

packages:
  - vim
  - podman
  - nftables

write_files:
  - path: /etc/sysconfig/nftables.conf
    owner: root:root
    permissions: "0644"
    content: |
      table inet filter {
        chain input {
          type filter hook input priority 0;
          policy accept;

          ct state established,related accept
          iif lo accept

          tcp dport { 22, 80, 443 } accept
          ip protocol icmp accept
          ip6 nexthdr icmpv6 accept
        }
      }

  - path: /etc/containers/networks/podman.json
    owner: root:root
    permissions: "0644"
    content: |
      {
        "name": "podman",
        "driver": "bridge",
        "network_interface": "podman0",
        "subnets": [
          {
            "subnet": "10.88.0.0/16",
            "gateway": "10.88.0.1"
          },
          {
            "subnet": "fdfc:77c5:9804:136::/64",
            "gateway": "fdfc:77c5:9804:136::1"
          }
        ],
        "ipv6_enabled": true,
        "dns_enabled": true
      }
  - path: /etc/nginx/nginx.conf
    owner: root:root
    permissions: "0644"
    content: |
      user nginx;
      worker_processes auto;
      error_log /var/log/nginx/error.log;
      pid /run/nginx.pid;

      events {
        worker_connections 1024;
      }

      http {
        access_log off;
        resolver 10.88.0.1;  # !! DNS server for podman network
        sendfile            on;
        tcp_nopush          on;
        keepalive_timeout   65;
        types_hash_max_size 4096;
        client_max_body_size 10m;
        include             /etc/nginx/mime.types;
        default_type        application/octet-stream;
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript application/x-javascript;
        proxy_cache_path /var/cache/nginx/dfmsite keys_zone=dfmsite:10m;
        proxy_cache_path /var/cache/nginx/jaroelsite keys_zone=jaroelsite:10m;
        proxy_cache_revalidate on;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock off;
        proxy_buffering on;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;  # about 40000 sessions
        ssl_session_tickets off;
        ssl_protocols TLSv1.3;
        ssl_ecdh_curve X25519:prime256v1:secp384r1;
        ssl_prefer_server_ciphers off;
        ssl_early_data off;
        add_header Strict-Transport-Security "max-age=63072000" always;


        server {
          listen 80 default_server;
          listen [::]:80 default_server;
          server_name _;
          location /.well-known/acme-challenge/ { root /var/www/letsencrypt; }
          return 301 https://$host$request_uri;
        }

        server {
          listen 443 ssl default_server;
          listen [::]:443 ssl default_server;
          server_name _;
          ssl_reject_handshake on;
          return 404;
        }

        server {
          listen 80;
          listen [::]:80;
          server_name stream.dinxperfm.nl;
          location /.well-known/acme-challenge/ { root /var/www/letsencrypt; }
          location / { return 301 https://stream.dinxperfm.nl$request_uri; }
        }
        server {
          listen 443 ssl;
          listen [::]:443 ssl;
          http2 on;
          server_name "stream.dinxperfm.nl";
          ssl_certificate /etc/letsencrypt/live/$host/fullchain.pem;
          ssl_certificate_key /etc/letsencrypt/live/$host/privkey.pem;
          proxy_connect_timeout 3s;
          proxy_http_version 1.1;
          default_type audio/mpeg;

          if ($host != "stream.dinxperfm.nl") { return 301 https://stream.dinxperfm.nl$request_uri; }

          location / {
            if ($http_range ~ ^bytes=0-1$) {
              add_header Accept-Ranges "bytes";
              add_header Content-Range "bytes 0-1/*";
              return 206 "ID";
            }
            proxy_pass "http://dinxperfm.freeddns.org:8082";
            proxy_request_buffering off;
            proxy_buffering off;
            proxy_connect_timeout 5s;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          }
        }

        upstream dfmsite {
            server 127.0.0.1:3001;
        }

        server {
          listen 80;
          listen [::]:80;
          server_name www.dinxperfm.nl dinxperfm.nl;
          location /.well-known/acme-challenge/ { root /var/www/letsencrypt; }
          location / { return 301 https://www.dinxperfm.nl$request_uri; }
        }
        server {
          listen 443 ssl;
          listen [::]:443 ssl;
          http2 on;
          server_name www.dinxperfm.nl dinxperfm.nl;
          ssl_certificate /etc/letsencrypt/live/$host/fullchain.pem;
          ssl_certificate_key /etc/letsencrypt/live/$host/privkey.pem;
          proxy_cache dfmsite;
          proxy_connect_timeout 3s;
          proxy_http_version 1.1;
          add_header X-Cache-Status $upstream_cache_status;

          if ($host != "www.dinxperfm.nl") { return 301 https://www.dinxperfm.nl$request_uri; }

          # !! remove when vinxi bundles favicons correctly.
          rewrite ^\/_build\/assets\/favicon-(.*).ico$ /assets/favicon-$1.ico last;

          location / {
            proxy_pass http://dfmsite;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
          }
        }


        upstream jaroelsite {
            server 127.0.0.1:3002;
        }

        server {
          listen 80;
          listen [::]:80;
          server_name www.jaroel.nl jaroel.nl www.roelbruggink.nl roelbruggink.nl;
          location /.well-known/acme-challenge/ { root /var/www/letsencrypt; }
          location / { return 301 https://www.jaroel.nl$request_uri; }
        }
        server {
          listen 443 ssl;
          listen [::]:443 ssl;
          http2 on;
          server_name www.jaroel.nl jaroel.nl www.roelbruggink.nl roelbruggink.nl;
          ssl_certificate /etc/letsencrypt/live/$host/fullchain.pem;
          ssl_certificate_key /etc/letsencrypt/live/$host/privkey.pem;
          proxy_cache jaroelsite;
          add_header X-Cache-Status $upstream_cache_status;
          proxy_http_version 1.1;

          if ($host != "www.jaroel.nl") { return 301 https://www.jaroel.nl$request_uri; }

          # !! remove when vinxi bundles favicons correctly.
          rewrite ^\/_build\/assets\/favicon-(.*).ico$ /assets/favicon-$1.ico last;

          location / {
            proxy_pass http://jaroelsite;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
          }
        }

        upstream sbdgsite {
          server 127.0.0.1:3003;
        }
        server {
          listen 80;
          listen [::]:80;
          server_name sbdg.toffe.site;
          location /.well-known/acme-challenge/ { root /var/www/letsencrypt; }
          location / { return 301 https://www.sbdg.eu$request_uri; }
        }

        server {
          listen 443 ssl;
          listen [::]:443 ssl;
          http2 on;
          server_name sbdg.toffe.site;
          ssl_certificate /etc/letsencrypt/live/sbdg.toffe.site/fullchain.pem;
          ssl_certificate_key /etc/letsencrypt/live/sbdg.toffe.site/privkey.pem;

          location / {
            proxy_pass http://sbdgsite;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
          }

          # /static is served by whitenoise (incl headers)
          location /media/ {
            root /srv/containers/sbdgsite/media/;
            expires 30d;
            add_header Cache-Control "public, max-age=2592000";
          }
        }
      }

  - path: /etc/containers/systemd/dfmsite.container
    owner: root:root
    permissions: "0755"
    content: |
      [Unit]
      Description=DinxperFM - Website

      [Install]
      WantedBy=multi-user.target

      [Service]
      Restart=on-failure

      [Container]
      Image=docker.io/dfmsite:latest
      AutoUpdate=local
      Exec=
      PublishPort=127.0.0.1:3001:3000
      ReadOnly=true
      Environment=ORIGIN=https://www.dinxperfm.nl/

  - path: /etc/containers/systemd/jaroelsite.container
    owner: root:root
    permissions: "0755"
    content: |
      [Unit]
      Description=jaroel - Website

      [Install]
      WantedBy=multi-user.target

      [Service]
      Restart=on-failure

      [Container]
      Image=docker.io/jaroelsite:latest
      AutoUpdate=local
      Exec=
      ReadOnly=true
      PublishPort=127.0.0.1:3002:3000
      Environment=ORIGIN=https://www.jaroel.nl/

  - path: /etc/containers/systemd/sbdg.network
    owner: root:root
    permissions: "0755"
    content: |
      [Unit]
      Description=SBDG network

      [Network]
      NetworkName=sbdg

  - path: /etc/containers/systemd/sbdgsite.container
    owner: root:root
    permissions: "0755"
    content: |
      [Unit]
      Description=SBDG - Website
      Requires=sbdgredis.service
      After=sbdgredis.service

      [Install]
      WantedBy=multi-user.target

      [Service]
      Restart=on-failure
      LimitNOFILE=65536

      [Container]
      Image=docker.io/sbdgsite:latest
      Network=sbdg.network
      AutoUpdate=local
      Exec=
      PublishPort=127.0.0.1:3003:8000
      ReadOnly=true
      Environment=SECRET_KEY=
      Volume=/srv/containers/sbdgsite/media:/app/src/media:z
      Volume=/srv/containers/sbdgsite/db:/app/src/db:z

  - path: /etc/containers/systemd/sbdgredis.container
    owner: root:root
    permissions: "0755"
    content: |
      [Unit]
      Description=SBDG - Redis

      [Install]
      WantedBy=multi-user.target

      [Service]
      Restart=on-failure

      [Container]
      Image=docker.io/redis:8
      Network=sbdg.network
      AutoUpdate=registry
      ReadOnly=true
      Volume=/srv/containers/sbdgredis/data:/data:z

  - path: /etc/containers/systemd/nginx.container
    owner: root:root
    permissions: "0755"
    content: |
      [Unit]
      Description=nginx reverse proxy
      After=podman.service
      Requires=podman.service

      [Install]
      WantedBy=multi-user.target

      [Service]
      ExecReload=/usr/bin/podman exec systemd-nginx /usr/sbin/nginx -s reload
      Restart=on-failure

      [Container]
      Image=docker.io/nginx
      AutoUpdate=registry
      Network=host
      Volume=/etc/nginx/nginx.conf:/etc/nginx/nginx.conf:z,ro
      Volume=/var/www/letsencrypt:/var/www/letsencrypt:z,ro
      Volume=/etc/letsencrypt:/etc/letsencrypt:z,ro
      Volume=/srv/containers/sbdgsite/media:/srv/containers/sbdgsite/media:z,ro

  - path: /etc/systemd/system/certbot-renew.timer
    owner: root:root
    permissions: "0755"
    content: |
      [Unit]
      Description=Daily certbot renewal

      [Timer]
      OnCalendar=daily
      Persistent=true

      [Install]
      WantedBy=timers.target

  - path: /etc/systemd/system/certbot-renew.service
    owner: root:root
    permissions: "0755"
    content: |
      [Unit]
      Description=Renew SSL certificates

      [Service]
      Type=oneshot
      ExecStart=/usr/bin/podman run --rm \
        --name certbot \
        -v /etc/letsencrypt:/etc/letsencrypt:z \
        -v /var/www/letsencrypt:/var/www/letsencrypt:z \
        certbot/certbot renew
runcmd:
  - systemctl enable nftables
  - systemctl start nftables
  - mkdir -p /etc/letsencrypt/{live,archive} -p /var/lib/letsencrypt -p /var/www/letsencrypt/.well-known/acme-challenge
  - mkdir -p /srv/containers/sbdgsite/{media,db}
  - mkdir -p /srv/containers/sbdgredis/data/
  - systemctl daemon-reload
  - systemctl enable nginx.service dfmsite.service jaroelsite.service sbdgsite.service
  - systemctl restart nginx.service
  - systemctl enable certbot-renew.service certbot-renew.timer && systemctl start certbot-renew.timer
  - systemctl enable podman-auto-update.service podman-auto-update.timer && systemctl start podman-auto-update.timer
